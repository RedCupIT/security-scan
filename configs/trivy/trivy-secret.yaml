# Trivy secret scanning rules
# Docs: https://aquasecurity.github.io/trivy/latest/docs/secret/configuration/

# Enable all built-in secret rules
enable-builtin-rules: true

# Custom rules (add your org-specific patterns here)
# rules:
#   - id: org-internal-token
#     category: general
#     title: Internal API Token
#     severity: CRITICAL
#     regex: 'myorg_[a-zA-Z0-9]{32}'
#     keywords:
#       - myorg_

# Paths to ignore during secret scanning
allow-rules:
  - id: skip-test-fixtures
    path: ".*test.*"
  - id: skip-examples
    path: ".*example.*"
