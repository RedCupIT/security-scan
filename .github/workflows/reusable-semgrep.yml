name: Reusable — Semgrep Scan

on:
  workflow_call:
    secrets:
      SEMGREP_APP_TOKEN:
        required: false

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/javascript \
            --config p/python \
            --config p/golang \
            --config p/docker \
            --config p/terraform \
            --sarif \
            --output semgrep.sarif \
            --no-error \
            .
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
